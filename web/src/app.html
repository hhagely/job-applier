<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Resolve the effective theme before first paint to avoid a flash.
			// Mirrors src/lib/theme.svelte.ts: pref = System/Light/Dark, System
			// follows prefers-color-scheme. Default is dark (the app's heritage).
			(function () {
				var de = document.documentElement;
				try {
					var pref = localStorage.getItem('ja-theme') || 'system';
					var light =
						pref === 'light' ||
						(pref === 'system' &&
							window.matchMedia('(prefers-color-scheme: light)').matches);
					de.setAttribute('data-theme', light ? 'light' : 'dark');
				} catch (e) {
					de.setAttribute('data-theme', 'dark');
				}
				// Appearance prefs (accent hue + reading typography). Mirrors
				// src/lib/appearance.svelte.ts so the choice applies before paint.
				try {
					var ap = JSON.parse(localStorage.getItem('ja-appearance') || '{}') || {};
					if (ap.accent) de.setAttribute('data-accent', ap.accent);
					if (ap.readingSize) de.setAttribute('data-reading-size', ap.readingSize);
					if (ap.readingFont) de.setAttribute('data-reading-font', ap.readingFont);
					if (ap.readingSpacing) de.setAttribute('data-reading-spacing', ap.readingSpacing);
					if (ap.readingWidth) de.setAttribute('data-reading-width', ap.readingWidth);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
